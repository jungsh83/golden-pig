version: "1.0"
metadata:
  name: 삼성전자 듀얼MACD Momentum 전략
  description: |
    진입: 빠른 MACD(6/13/5) 골든크로스 + RSI > 45
    청산: 느린 MACD(12/26/9) 데드크로스 OR RSI > 75
    듀얼 MACD로 단기 노이즈에 의한 조기 청산 방지
  category: momentum
  author: user
  ticker: "005930"

strategy:
  id: samsung_macd_rsi
  indicators:
    - id: macd
      alias: macd_fast
      params:
        fast: 6
        slow: 13
        signal: 5
    - id: macd
      alias: macd_slow
      params:
        fast: 12
        slow: 26
        signal: 9
    - id: rsi
      alias: rsi
      params:
        period: 14

  entry:
    logic: AND
    conditions:
      - indicator: macd_fast
        output: value
        operator: cross_above
        compare_to: macd_fast
        compare_output: signal
      - indicator: rsi
        operator: greater_than
        value: 45

  exit:
    logic: OR
    conditions:
      - indicator: macd_slow
        output: value
        operator: cross_below
        compare_to: macd_slow
        compare_output: signal
      - indicator: rsi
        operator: greater_than
        value: 75

risk:
  stop_loss:
    enabled: true
    percent: 4.0
  take_profit:
    enabled: true
    percent: 18.0
  trailing_stop:
    enabled: true
    percent: 3.0
